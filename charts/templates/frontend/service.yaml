apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ include "google-keep-clone.namespace" . }}
  labels: {{- include "google-keep-clone.labels" . | nindent 4 }}
spec:
  selector: {{- include "google-keep-clone.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
