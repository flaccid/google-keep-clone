apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: {{ include "google-keep-clone.namespace" . }}
  labels: {{- include "google-keep-clone.labels" . | nindent 4 }}
spec:
  selector: {{- include "google-keep-clone.oauth2-proxy.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 4180
  type: ClusterIP
