name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  DOCKER_IMAGE_BACKEND: flaccid/google-keep-clone-backend
  DOCKER_IMAGE_FRONTEND: flaccid/google-keep-clone-frontend
  CI_DB_USER: ${{ secrets.CI_DB_USER || 'keep' }}
  CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'keep' }}
  CI_DB_NAME: ${{ secrets.CI_DB_NAME || 'keep' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./backend/go.sum
      - name: Vet
        working-directory: ./backend
        run: go vet ./...
      - name: Vulncheck
        working-directory: ./backend
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ env.CI_DB_PASSWORD }}
          POSTGRES_DB: ${{ env.CI_DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./backend/go.sum
      - name: Build
        working-directory: ./backend
        run: go build ./...
      - name: Test
        working-directory: ./backend
        env:
          DATABASE_URL: "postgres://${{ env.CI_DB_USER }}:${{ env.CI_DB_PASSWORD }}@localhost:5432/${{ env.CI_DB_NAME }}?sslmode=disable"
        run: go test -count=1 ./store/...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install deps
        working-directory: ./frontend
        run: npm ci
      - name: Audit
        working-directory: ./frontend
        continue-on-error: true
        run: npm audit --audit-level=moderate
      - name: Build
        working-directory: ./frontend
        run: npm run build

  docker:
    if: github.ref == 'refs/heads/main'
    needs: [lint, build, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKER_IMAGE_BACKEND }}:latest,${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKER_IMAGE_FRONTEND }}:latest,${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            API_UPSTREAM_URL=http://backend:8080
