name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  DOCKER_IMAGE_BACKEND: flaccid/google-keep-clone-backend
  DOCKER_IMAGE_FRONTEND: flaccid/google-keep-clone-frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./backend/go.sum
      - name: Vet
        working-directory: ./backend
        run: go vet ./...

  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: keep
          POSTGRES_PASSWORD: keep
          POSTGRES_DB: keep
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./backend/go.sum
      - name: Build
        working-directory: ./backend
        run: go build ./...
      - name: Test
        working-directory: ./backend
        env:
          DATABASE_URL: "postgres://keep:keep@localhost:5432/keep?sslmode=disable"
        run: go test -count=1 ./store/...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install deps
        working-directory: ./frontend
        run: npm ci
      - name: Build
        working-directory: ./frontend
        run: npm run build

  docker:
    if: github.ref == 'refs/heads/main'
    needs: [lint, build, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKER_IMAGE_BACKEND }}:latest,${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKER_IMAGE_FRONTEND }}:latest,${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}
