                        text: Velit numquam non totam.
                    - checked: false
                      childListItems:
                        - {}
                        - {}
                        - {}
                        - {}
                      text:
                        text: Velit numquam non totam.
        description: The list of items for a single list note.
        example:
            listItems:
                - checked: false
                  childListItems:
                    - {}
                    - {}
                    - {}
                    - {}
                  text:
                    text: Velit numquam non totam.
