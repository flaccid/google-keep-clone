        title: ListContent
        type: object
        properties:
            listItems:
                type: array
                items:
                    $ref: '#/definitions/ListItem'
                description: The items in the list.
                example:
                    - checked: false
                      childListItems:
                        - {}
                        - {}
                        - {}
                        - {}
