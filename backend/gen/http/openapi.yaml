swagger: "2.0"
info:
    title: Google Keep Clone API
    description: A clone of the Google Keep REST API, designed to mirror the official API surface.
    version: "1.0"
host: localhost:8080
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /v1/labels:
        get:
            tags:
                - labels
            summary: list labels
            description: Lists all labels.
            operationId: labels#list
            responses:
                "200":
                    description: OK response.
                    schema:
                        type: array
                        items:
                            $ref: '#/definitions/Label'
            schemes:
                - http
        post:
            tags:
                - labels
            summary: create labels
            description: Creates a new label.
            operationId: labels#create
            parameters:
                - name: CreateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/LabelsCreateRequestBody'
                    required:
                        - displayName
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Label'
            schemes:
                - http
    /v1/labels/{id}:
        delete:
            tags:
                - labels
            summary: delete labels
            description: Deletes a label.
            operationId: labels#delete
            parameters:
                - name: id
                  in: path
                  description: The ID of the label to delete.
                  required: true
                  type: string
            responses:
                "204":
                    description: No Content response.
            schemes:
                - http
    /v1/notes:
        get:
            tags:
                - notes
            summary: list notes
            description: Lists notes with optional filtering and pagination.
            operationId: notes#list
            parameters:
                - name: pageSize
                  in: query
                  description: The maximum number of results to return.
                  required: false
                  type: integer
                  format: int64
                - name: pageToken
                  in: query
                  description: The previous page's nextPageToken field.
                  required: false
                  type: string
                - name: filter
                  in: query
                  description: 'Filter for list results. Valid fields: createTime, updateTime, trashTime, trashed.'
                  required: false
                  type: string
                - name: search
                  in: query
                  description: Search term to filter notes by title and body text.
                  required: false
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ListNotesResponse'
            schemes:
                - http
        post:
            tags:
                - notes
            summary: create notes
            description: Creates a new note.
            operationId: notes#create
            parameters:
                - name: CreateRequestBody
                  in: body
                  description: The note to create.
                  required: true
                  schema:
                    $ref: '#/definitions/NoteRequest'
            responses:
                "201":
                    description: Created response.
                    schema:
                        $ref: '#/definitions/Note'
            schemes:
                - http
    /v1/notes/{id}:
        get:
            tags:
                - notes
            summary: get notes
            description: Gets a note by id.
            operationId: notes#get
            parameters:
                - name: id
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Note'
            schemes:
                - http
        delete:
            tags:
                - notes
            summary: delete notes
            description: Deletes a note.
            operationId: notes#delete
            parameters:
                - name: id
                  in: path
                  description: The ID of the note to delete.
                  required: true
                  type: string
            responses:
                "204":
                    description: No Content response.
            schemes:
                - http
        patch:
            tags:
                - notes
            summary: update notes
            description: Updates a note. Fields not specified are left unchanged.
            operationId: notes#update
            parameters:
                - name: id
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
                - name: UpdateRequestBody
                  in: body
                  description: The note fields to update.
                  required: true
                  schema:
                    $ref: '#/definitions/NoteRequest'
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Note'
            schemes:
                - http
    /v1/notes/{id}:archive:
        post:
            tags:
                - notes
            summary: archive notes
            description: Archives a note.
            operationId: notes#archive
            parameters:
                - name: id
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Note'
            schemes:
                - http
    /v1/notes/{id}:pin:
        post:
            tags:
                - notes
            summary: pin notes
            description: Pins a note.
            operationId: notes#pin
            parameters:
                - name: id
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Note'
            schemes:
                - http
    /v1/notes/{id}:restore:
        post:
            tags:
                - notes
            summary: restore notes
            description: Restores a trashed note.
            operationId: notes#restore
            parameters:
                - name: id
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Note'
            schemes:
                - http
    /v1/notes/{id}:trash:
        post:
            tags:
                - notes
            summary: trash notes
            description: Trashes a note.
            operationId: notes#trash
            parameters:
                - name: id
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Note'
            schemes:
                - http
    /v1/notes/{id}:unarchive:
        post:
            tags:
                - notes
            summary: unarchive notes
            description: Unarchives a note.
            operationId: notes#unarchive
            parameters:
                - name: id
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Note'
            schemes:
                - http
    /v1/notes/{id}:unpin:
        post:
            tags:
                - notes
            summary: unpin notes
            description: Unpins a note.
            operationId: notes#unpin
            parameters:
                - name: id
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Note'
            schemes:
                - http
    /v1/notes/{noteId}/attachments/{attachmentId}:
        get:
            tags:
                - media
            summary: download media
            description: Downloads an attachment.
            operationId: media#download
            produces:
                - application/octet-stream
            parameters:
                - name: noteId
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
                - name: attachmentId
                  in: path
                  description: The ID of the attachment.
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        type: string
                        format: byte
            schemes:
                - http
    /v1/notes/{noteId}/permissions:batchCreate:
        post:
            tags:
                - permissions
            summary: batchCreate permissions
            description: Creates one or more permissions on a note.
            operationId: permissions#batchCreate
            parameters:
                - name: noteId
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
                - name: BatchCreateRequestBody
                  in: body
                  description: The permissions to create.
                  required: true
                  schema:
                    $ref: '#/definitions/BatchCreatePermissionsRequest'
            responses:
                "200":
                    description: OK response.
                    schema:
                        type: array
                        items:
                            $ref: '#/definitions/Permission'
            schemes:
                - http
    /v1/notes/{noteId}/permissions:batchDelete:
        post:
            tags:
                - permissions
            summary: batchDelete permissions
            description: Deletes one or more permissions on a note.
            operationId: permissions#batchDelete
            parameters:
                - name: noteId
                  in: path
                  description: The ID of the note.
                  required: true
                  type: string
                - name: BatchDeleteRequestBody
                  in: body
                  description: The permissions to delete.
                  required: true
                  schema:
                    $ref: '#/definitions/BatchDeletePermissionsRequest'
            responses:
                "204":
                    description: No Content response.
            schemes:
                - http
definitions:
    Attachment:
        title: Attachment
        type: object
        properties:
            mimeType:
                type: array
                items:
                    type: string
                    example: Labore quis quo.
                description: The MIME types in which the attachment is available.
                example:
                    - Ut blanditiis natus voluptatem aut voluptatibus.
                    - Maxime est autem natus eum autem.
            name:
                type: string
                description: The resource name of the attachment.
                example: Ipsa voluptatibus repudiandae modi quos.
        description: An attachment to a note.
        example:
            mimeType:
                - Natus quo earum.
                - Debitis sed at.
                - Ab ex molestiae sit aut esse laboriosam.
            name: In nihil.
    BatchCreatePermissionsRequest:
        title: BatchCreatePermissionsRequest
        type: object
        properties:
            requests:
                type: array
                items:
                    $ref: '#/definitions/CreatePermissionRequest'
                description: The permission requests to create.
                example:
                    - email: Id beatae aliquid consequuntur quisquam occaecati dolor.
                      role: OWNER
                    - email: Id beatae aliquid consequuntur quisquam occaecati dolor.
                      role: OWNER
                    - email: Id beatae aliquid consequuntur quisquam occaecati dolor.
                      role: OWNER
                    - email: Id beatae aliquid consequuntur quisquam occaecati dolor.
                      role: OWNER
        description: Request to create one or more permissions on a note.
        example:
            requests:
                - email: Id beatae aliquid consequuntur quisquam occaecati dolor.
                  role: OWNER
                - email: Id beatae aliquid consequuntur quisquam occaecati dolor.
                  role: OWNER
                - email: Id beatae aliquid consequuntur quisquam occaecati dolor.
                  role: OWNER
    BatchDeletePermissionsRequest:
        title: BatchDeletePermissionsRequest
        type: object
        properties:
            names:
                type: array
                items:
                    type: string
                    example: Autem odio dolores.
                description: The resource names of the permissions to delete.
                example:
                    - Aut iure commodi aliquam consequatur delectus rem.
                    - Quo hic amet tenetur.
                    - Consequatur voluptatem quam soluta.
                    - Repellendus sed enim enim in ratione voluptatem.
        description: Request to delete one or more permissions on a note.
        example:
            names:
                - Deleniti quasi distinctio et veniam.
                - Ut laboriosam velit asperiores.
    CreatePermissionRequest:
        title: CreatePermissionRequest
        type: object
        properties:
            email:
                type: string
                description: The email of the user to grant the permission to.
                example: Rem aut numquam voluptatibus voluptas sapiente eligendi.
            role:
                type: string
                description: The role to grant.
                example: OWNER
                enum:
                    - OWNER
                    - WRITER
        description: A request to create a single permission.
        example:
            email: Nihil est quasi in sit voluptatem laudantium.
            role: OWNER
    Family:
        title: Family
        type: object
        description: Describes a single Google Family. Empty type.
        example: {}
    Group:
        title: Group
        type: object
        properties:
            email:
                type: string
                description: The group email.
                example: Consequatur officia est suscipit eaque.
        description: Describes a single group.
        example:
            email: Aperiam omnis beatae sunt quis quia.
    Label:
        title: Label
        type: object
        properties:
            displayName:
                type: string
                description: The display name of the label.
                example: Neque aliquid voluptas non voluptatem.
            name:
                type: string
                description: The resource name of the label (e.g. 'labels/{uuid}').
                example: Est ipsum.
        description: A label that can be assigned to notes.
        example:
            displayName: Praesentium autem nobis dolorum quo enim voluptas.
            name: Earum aut nesciunt vel optio.
    LabelsCreateRequestBody:
        title: LabelsCreateRequestBody
        type: object
        properties:
            displayName:
                type: string
                description: The display name of the label.
                example: Et et nihil porro.
        example:
            displayName: Nihil quam similique.
        required:
            - displayName
    ListContent:
        title: ListContent
        type: object
        properties:
            listItems:
                type: array
                items:
                    $ref: '#/definitions/ListItem'
                description: The items in the list.
                example:
                    - checked: true
                      childListItems:
                        - {}
                        - {}
                        - {}
                        - {}
                      text:
                        text: Voluptas dolor minus.
                    - checked: true
                      childListItems:
                        - {}
                        - {}
                        - {}
                        - {}
                      text:
                        text: Voluptas dolor minus.
                    - checked: true
                      childListItems:
                        - {}
                        - {}
                        - {}
                        - {}
                      text:
                        text: Voluptas dolor minus.
        description: The list of items for a single list note.
        example:
            listItems:
                - checked: true
                  childListItems:
                    - {}
                    - {}
                    - {}
                    - {}
                  text:
                    text: Voluptas dolor minus.
                - checked: true
                  childListItems:
                    - {}
                    - {}
                    - {}
                    - {}
                  text:
                    text: Voluptas dolor minus.
    ListItem:
        title: ListItem
        type: object
        properties:
            checked:
                type: boolean
                description: Whether this item has been checked off.
                example: false
            childListItems:
                type: array
                items:
                    $ref: '#/definitions/ListItem'
                description: Nested list items. Only one level of nesting is allowed.
                example:
                    - checked: true
                      childListItems:
                        - {}
                        - {}
                        - {}
                        - {}
                      text:
                        text: Voluptas dolor minus.
                    - checked: true
                      childListItems:
                        - {}
                        - {}
                        - {}
                        - {}
                      text:
                        text: Voluptas dolor minus.
            text:
                $ref: '#/definitions/TextContent'
        description: A single list item in a note's list.
        example:
            checked: false
            childListItems:
                - checked: true
                  childListItems:
                    - {}
                    - {}
                    - {}
                    - {}
                  text:
                    text: Voluptas dolor minus.
                - checked: true
                  childListItems:
                    - {}
                    - {}
                    - {}
                    - {}
                  text:
                    text: Voluptas dolor minus.
                - checked: true
