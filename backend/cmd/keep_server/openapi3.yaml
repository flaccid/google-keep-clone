openapi: 3.0.3
info:
    title: Google Keep Clone API
    description: A clone of the Google Keep REST API, designed to mirror the official API surface.
    version: "1.0"
servers:
    - url: http://localhost:8080
      description: The Google Keep Clone server.
paths:
    /v1/labels:
        get:
            tags:
                - labels
            summary: list labels
            description: Lists all labels.
            operationId: labels#list
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Label'
                                description: The list of labels.
                                example:
                                    - displayName: Vitae officia iusto eum.
                                      name: Modi ut voluptas dolor.
                                    - displayName: Vitae officia iusto eum.
                                      name: Modi ut voluptas dolor.
                                    - displayName: Vitae officia iusto eum.
                                      name: Modi ut voluptas dolor.
                            example:
                                - displayName: Vitae officia iusto eum.
                                  name: Modi ut voluptas dolor.
                                - displayName: Vitae officia iusto eum.
                                  name: Modi ut voluptas dolor.
        post:
            tags:
                - labels
            summary: create labels
            description: Creates a new label.
            operationId: labels#create
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateRequestBody'
                        example:
                            displayName: Dolorem deserunt et.
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Label'
                            example:
                                displayName: Dolorem ut debitis velit numquam non totam.
                                name: Est est quis saepe velit nemo consequatur.
    /v1/labels/{id}:
        delete:
            tags:
                - labels
            summary: delete labels
            description: Deletes a label.
            operationId: labels#delete
            parameters:
                - name: id
                  in: path
                  description: The ID of the label to delete.
                  required: true
                  schema:
                    type: string
                    description: The ID of the label to delete.
                    example: Consectetur provident nesciunt odio.
                  example: Impedit quo.
            responses:
                "204":
                    description: No Content response.
        patch:
            tags:
                - labels
            summary: update labels
            description: Updates the display name of a label.
            operationId: labels#update
            parameters:
                - name: id
                  in: path
                  description: The ID of the label to update.
                  required: true
                  schema:
                    type: string
                    description: The ID of the label to update.
                    example: Assumenda molestiae velit voluptate ut temporibus.
                  example: Libero facilis totam doloribus.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateRequestBody'
                        example:
                            displayName: Aliquid est quas blanditiis.
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Label'
                            example:
                                displayName: Blanditiis asperiores.
                                name: Aut exercitationem quia ea nam tenetur.
