apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend
  namespace: google-keep-clone
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend
  namespace: google-keep-clone
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres
  namespace: google-keep-clone
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: postgres
