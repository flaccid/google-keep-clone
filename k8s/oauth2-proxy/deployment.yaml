apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: google-keep-clone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:latest
          args:
            - --provider=google
            - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
            - --client-id=$(CLIENT_ID)
            - --client-secret=$(CLIENT_SECRET)
            - --cookie-secret=$(COOKIE_SECRET)
            - --redirect-url=https://keep.fordham.id.au/oauth2/callback
            - --cookie-secure=true
            - --http-address=0.0.0.0:4180
            - --set-authorization-header=true
            - --pass-basic-auth=false
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-config
                  key: client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-config
                  key: client-secret
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-config
                  key: cookie-secret
          volumeMounts:
            - name: emails
              mountPath: /etc/oauth2-proxy
          ports:
            - containerPort: 4180
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 64Mi
              cpu: 50m
      volumes:
        - name: emails
          configMap:
            name: oauth2-proxy-emails
