apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: google-keep-clone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: flaccid/google-keep-clone-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: postgres://keep:keep@postgres:5432/keep?sslmode=disable
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /v1/notes
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/notes
              port: 8080
            initialDelaySeconds: 5
