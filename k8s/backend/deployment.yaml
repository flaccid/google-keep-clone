apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: google-keep-clone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command: ['sh', '-c', 'until pg_isready -h postgres -U keep -d keep; do echo waiting for postgres; sleep 2; done']
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: password
      containers:
        - name: backend
          image: flaccid/google-keep-clone-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend
                  key: database-url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /v1/notes
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/notes
              port: 8080
            initialDelaySeconds: 5
