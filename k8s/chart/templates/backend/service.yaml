apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ include "google-keep-clone.namespace" . }}
  labels: {{- include "google-keep-clone.labels" . | nindent 4 }}
spec:
  selector: {{- include "google-keep-clone.backend.selectorLabels" . | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
