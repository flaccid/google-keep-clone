{{- if or .Values.secrets.create.oauth2Proxy.clientId .Values.secrets.create.oauth2Proxy.clientSecret .Values.secrets.create.oauth2Proxy.cookieSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-config
  namespace: {{ include "google-keep-clone.namespace" . }}
  labels: {{- include "google-keep-clone.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ .Values.secrets.create.oauth2Proxy.clientId | quote }}
  client-secret: {{ .Values.secrets.create.oauth2Proxy.clientSecret | quote }}
  cookie-secret: {{ .Values.secrets.create.oauth2Proxy.cookieSecret | quote }}
{{- end }}
