apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: google-keep-clone
  namespace: google-keep-clone
  annotations:
    nginx.ingress.kubernetes.io/auth-url: http://oauth2-proxy.google-keep-clone.svc.cluster.local/oauth2/auth
    nginx.ingress.kubernetes.io/auth-signin: https://keep.example.com/oauth2/start?rd=$escaped_request_uri
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - keep.example.com
      secretName: keep-tls
  rules:
    - host: keep.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: google-keep-clone-oauth2
  namespace: google-keep-clone
spec:
  ingressClassName: nginx
  rules:
    - host: keep.example.com
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 80
