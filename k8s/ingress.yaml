apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: google-keep-clone
  namespace: google-keep-clone
spec:
  ingressClassName: nginx
  rules:
    - host: keep.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
